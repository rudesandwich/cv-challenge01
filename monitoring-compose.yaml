services:
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - monitoring 

  grafana:
    image: grafana/grafana
    ports:
      -"3000:3000"
    networks:
      - monitoring 
      
  loki:
    image: grafana/loki
    ports:
      - "3100:3100"
    networks:
      - monitoring
      
  promtail:
    image: grafana/promtail
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml
    networks:
      - monitoring 
      
  cadvisor:
    image: gcr.io/cadvisor/cadvisor
    ports:
      - "8082:8080"
    volumes:
      - "/:/rootfs:ro"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "/var/lib/docker:/var/lib/docker:ro"
    networks:
      - monitoring
      
networks:
  monitoring:
    external: true
